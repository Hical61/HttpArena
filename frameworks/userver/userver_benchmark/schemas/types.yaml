components:
  schemas:
    Rating:
      type: object
      additionalProperties: false
      required:
        - score
        - count
      properties:
        score: { type: integer, format: int64 }
        count: { type: integer, format: int64 }
    Item:
      type: object
      additionalProperties: false
      required:
        - id
        - name
        - category
        - price
        - quantity
        - active
        - tags
        - rating
      properties:
        id:       { type: integer, format: int64 }
        name:     { type: string }
        category: { type: string }
        price:    { type: integer, format: int64 }
        quantity: { type: integer, format: int64 }
        active:   { type: boolean }
        tags:
          type: array
          items: { type: string }
        rating:
          $ref: '#/components/schemas/Rating'
        total:
          type: number
          default: 0
    JsonResponse:
      type: object
      additionalProperties: false
      required:
        - count
        - items
      properties:
        count: { type: integer }
        items:
          type: array
          items:
            $ref: '#/components/schemas/Item'
